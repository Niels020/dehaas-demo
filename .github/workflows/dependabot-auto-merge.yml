# Dependabot auto-merge for dehaas-demo
# Place at: .github/workflows/dependabot-auto-merge.yml
# Auto-merges minor/patch Dependabot PRs once CI passes. Major bumps are left for manual review.
# Requires: repo Settings -> General -> "Allow auto-merge" enabled.
name: Dependabot auto-merge

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    runs-on: ubuntu-latest
    # Use pull_request.user.login (matches the action's own check) to avoid
    # actor/author drift in re-run/rebase scenarios.
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for minor and patch
        if: steps.metadata.outputs.update-type == 'version-update:semver-minor' || steps.metadata.outputs.update-type == 'version-update:semver-patch'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
